<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status {
            font-size: 1.5rem;
            margin-bottom: 20px;
            height: 30px; /* Чтобы текст не прыгал */
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background-color: #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.3s, transform 0.2s;
        }

        .cell:hover {
            background-color: #3d3d3d;
        }

        /* Стили для X и O */
        .x {
            color: #ff4d4d; /* Красный неон */
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.7);
        }

        .o {
            color: #4d94ff; /* Синий неон */
            text-shadow: 0 0 10px rgba(77, 148, 255, 0.7);
        }

        button.restart-btn {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 1.2rem;
            background-color: #ff9800;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
        }

        button.restart-btn:hover {
            background-color: #ffb74d;
        }

        button.restart-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>Крестики-Нолики</h1>
    <div class="status" id="status">Ход игрока: X</div>

    <div class="board" id="board">
        <!-- Ячейки создаются здесь через JS -->
    </div>

    <button class="restart-btn" onclick="resetGame()">Начать заново</button>

    <script>
        const board = document.getElementById('board');
        const statusText = document.getElementById('status');
        
        let currentPlayer = 'X';
        let gameActive = true;
        let gameState = ["", "", "", "", "", "", "", "", ""];

        // Сообщения для статуса
        const winningMessage = () => `Победил игрок ${currentPlayer}!`;
        const drawMessage = () => `Ничья!`;
        const currentPlayerTurn = () => `Ход игрока: ${currentPlayer}`;

        // Выигрышные комбинации (индексы ячеек 0-8)
        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Горизонтали
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Вертикали
            [0, 4, 8], [2, 4, 6]             // Диагонали
        ];

        // Инициализация поля
        function createBoard() {
            board.innerHTML = ''; // Очистка при перезагрузке
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.setAttribute('data-index', i);
                cell.addEventListener('click', handleCellClick);
                board.appendChild(cell);
            }
        }

        // Обработка клика
        function handleCellClick(e) {
            const clickedCell = e.target;
            const clickedCellIndex = parseInt(clickedCell.getAttribute('data-index'));

            // Если ячейка занята или игра окончена - игнорируем клик
            if (gameState[clickedCellIndex] !== "" || !gameActive) {
                return;
            }

            handleCellPlayed(clickedCell, clickedCellIndex);
            checkResult();
        }

        // Запись хода и обновление UI
        function handleCellPlayed(clickedCell, clickedCellIndex) {
            gameState[clickedCellIndex] = currentPlayer;
            clickedCell.innerText = currentPlayer;
            
            // Добавляем класс цвета (x или o)
            if (currentPlayer === 'X') {
                clickedCell.classList.add('x');
            } else {
                clickedCell.classList.add('o');
            }
        }

        // Проверка результата
        function checkResult() {
            let roundWon = false;

            for (let i = 0; i <= 7; i++) { // проверяем все условия до 8 (индексы массива условий)
                const winCondition = winningConditions[i];
                let a = gameState[winCondition[0]];
                let b = gameState[winCondition[1]];
                let c = gameState[winCondition[2]];

                if (a === '' || b === '' || c === '') {
                    continue;
                }
                if (a === b && b === c) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                statusText.innerText = winningMessage();
                gameActive = false;
                return;
            }

            let roundDraw = !gameState.includes("");
            if (roundDraw) {
                statusText.innerText = drawMessage();
                gameActive = false;
                return;
            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";
            statusText.innerText = currentPlayerTurn();
        }

        // Перезапуск игры
        function resetGame() {
            gameActive = true;
            currentPlayer = "X";
            gameState = ["", "", "", "", "", "", "", "", ""];
            statusText.innerText = currentPlayerTurn();
            
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.innerText = "";
                cell.classList.remove('x');
                cell.classList.remove('o');
            });
        }

        // Запуск при загрузке
        createBoard();
    </script>
</body>
</html>
